# Windows File System Cardinality Monitor Configuration
# Install on Application Server - uses local paths
metrics.port=8084
monitor.interval.minutes=5
client.name=MyClient

# Location 1 - Local path on this server
fs.location.DAILY_REPORTS.name=Daily_Reports
fs.location.DAILY_REPORTS.path=C:\\Data\\Reports\\Daily
fs.location.DAILY_REPORTS.min.files=0
fs.location.DAILY_REPORTS.max.files=100

# Location 2 - Local path on this server
fs.location.LOG_ARCHIVE.name=Log_Archive
fs.location.LOG_ARCHIVE.path=C:\\Logs\\Archive
fs.location.LOG_ARCHIVE.min.files=0
fs.location.LOG_ARCHIVE.max.files=1000
