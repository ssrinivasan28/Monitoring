# IBM i Connection Details - now supports multiple hosts
# Provide a comma-separated list of IBM i hostnames or IP addresses.
ibmi.hosts=10.110.25.20

# Credentials for connecting to IBM i (assumed to be the same across all hosts for simplicity in this version)
ibmi.user=IPGUI
ibmi.password=IPGUI

# Monitoring Thresholds (%)
# Alert if CPU utilization goes above this percentage
ibmi.alert.threshold.cpu=1

# Alert if ASP utilization goes above this percentage (for ASP 1, or overall if not specified)
ibmi.alert.threshold.asp=1

# NEW: Alert if Shared Processor Pool utilization goes above this percentage (e.g., 80 for 80%)
ibmi.alert.threshold.shared.processor.pool=98

# NEW: Alert if Total Jobs in the system exceed this number (e.g., 1000)
ibmi.alert.threshold.total.jobs=30000000

# NEW: Alert if Active Jobs in the system exceed this number (e.g., 500)
ibmi.alert.threshold.active.jobs=1000000

# Monitor Settings
# Interval in seconds for checking metrics (e.g., 60 seconds = 1 minute)
# The Java code expects 'ibmi.monitor.interval.seconds' and converts it to milliseconds.
ibmi.monitor.interval.seconds=300

# Port for the Prometheus metrics exporter
metrics.exporter.port=3016