# Windows Server Monitoring Configuration
# Supports local and remote monitoring

# Comma-separated list of hosts to monitor (e.g., localhost, 10.0.0.5, server-01)
windows.servers.list=in-planning2,ipqa-auto2,smartretail6,smartstore3

# Optional: Per-server credentials (if remote server requires different account)
# Use the format: windows.server.<host>.username and windows.server.<host>.password
# windows.server.smartretail6.username=ADMIN-USER
# windows.server.smartretail6.password=SECURE-PASS

# Parallel Polling
windows.poll.threads=5

# Alert Windowing (Consecutive check failures required for alert)
windows.alert.window.size=3

# Windows Services to monitor (comma-separated service names)
# Example: MSSQLSERVER,W3SVC,LanmanServer
windows.services.to.monitor=

# Metrics port for Prometheus scraping
metrics.exporter.port=3017

# Monitoring interval in seconds
windows.monitor.interval.seconds=300

# Alert Thresholds (%)
windows.alert.threshold.cpu=90
windows.alert.threshold.memory=90
windows.alert.threshold.disk=90

# Top N processes to report by CPU
windows.top.n.processes=5

# Remediation 3: Kill top CPU process on breach
# Comma-separated list of process names allowed to be killed (safety allow-list)
# Leave blank to disable CPU kill
windows.cpu.killable.processes=

# Remediation 4: Auto disk cleanup on breach (removes Temp folders)
# Set to false to disable
windows.disk.cleanup.enabled=true

# Remediation 8: Auto-restart stopped services
# Number of restart attempts before escalating to manual-intervention alert
# Set to 0 to disable auto-restart
windows.service.max.restart.attempts=3

# Path to email configuration file
email.config.path=email.properties

# Log settings
log.level=INFO
log.folder=logs
log.retention.days=30
log.purge.interval.hours=24
