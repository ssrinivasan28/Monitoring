# Windows File System Error Monitor Configuration
# Install on Application Server - uses local paths
metrics.port=8085
monitor.interval.minutes=5
client.name=MyClient

# Path to email configuration file
email.config.path=email.properties

# Location 1 - Local path on this server
monitor.location.APP_ERRORS.path=C:\\Logs\\Errors
monitor.location.APP_ERRORS.types=ERR,LOG

# Location 2 - Local path on this server
monitor.location.BATCH_FAILURES.path=C:\\BatchJobs\\Failures
monitor.location.BATCH_FAILURES.types=FAIL,ERR
