# ShareFile FTPS Monitor Configuration

# FTPS connection (implicit SSL, port 990)
ftp.host=islandpacific.sharefileftp.com
ftp.username=islandpacific/managedservices@islandpacific.com
#ftp.password=AT723NW6MQYU27BS
ftp.password=SX5PIWNGCEYDI6U4

# How often to poll ShareFile folders (minutes)
monitor.interval.minutes=1

# Consecutive breaches before alert email fires (default: 3)
alert.window.size=3

# Client name (shown in alert emails)
client.name=IslandPacific

# Monitored folders — add one block per folder
# Pattern: sf.folder.<code>.name / path / min.files / max.files / ignore.zero.file.alert

sf.folder.testfolder.name=TCCC-ECOMM_ORDERS
sf.folder.testfolder.path=/ip00357/TCCC-ECOMM/IMPORT/Test 
sf.folder.testfolder.min.files=0
sf.folder.testfolder.max.files=1
sf.folder.testfolder.ignore.zero.file.alert=false


# Prometheus metrics port
metrics.port=3026

# Logging
log.level=INFO
log.folder=logs
log.retention.days=30
log.purge.interval.hours=24

