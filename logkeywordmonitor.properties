# Log Keyword Monitor Configuration
# Monitors log files for specific keywords and sends email alerts

# Metrics port for Prometheus scraping
metrics.port=3023

# Check interval in minutes
check.interval.minutes=1

# Client name (used in email subject)
client.name=MyClient

# Path to email configuration file
email.config.path=email.properties

# NOTE: For paths with spaces (e.g., "C:\Program Files\..."), create a junction point:
#   Run: .\create_smartretail_link.ps1
#   Then use: C:\SmartRetailLogs\catalina.*.log

# Log file 1 - Monitor all Catalina logs (Tomcat main logs)
monitor.logfile.1.name=Catalina Log Folder
monitor.logfile.1.path=C:\\Program Files\\Island Pacific\\SmartRetail\\server\\logs\\catalina.*.log
monitor.logfile.1.keywords=ERROR,FATAL,Exception,OutOfMemoryError,StackOverflowError,SEVERE
monitor.logfile.1.case.sensitive=false
monitor.logfile.1.regex.mode=false
monitor.logfile.1.alert.on.first.match=true

# Log file 2 - Monitor all localhost logs
monitor.logfile.2.name=Localhost Log Folder
monitor.logfile.2.path=C:\\Program Files\\Island Pacific\\SmartRetail\\server\\logs\\localhost.*.log
monitor.logfile.2.keywords=ERROR,FATAL,Exception,SEVERE
monitor.logfile.2.case.sensitive=false
monitor.logfile.2.regex.mode=false
monitor.logfile.2.alert.on.first.match=true

# Log file 3 - Monitor stderr logs (application errors)
monitor.logfile.3.name=SmartRetail Stderr Log Folder
monitor.logfile.3.path=C:\\Program Files\\Island Pacific\\SmartRetail\\server\\logs\\smartretail_trunk_nonsso-stderr.*.log
monitor.logfile.3.keywords=ERROR,FATAL,Exception,java.lang.OutOfMemoryError,NullPointerException
monitor.logfile.3.case.sensitive=false
monitor.logfile.3.regex.mode=false
monitor.logfile.3.alert.on.first.match=true

# Log file 4 - Monitor stdout logs (optional - usually just info, uncomment if needed)
#monitor.logfile.4.name=SmartRetail Stdout Log Folder
#monitor.logfile.4.path=C:\\Program Files\\Island Pacific\\SmartRetail\\server\\logs\\smartretail_trunk_nonsso-stdout.*.log
#monitor.logfile.4.keywords=ERROR,FATAL,Exception
#monitor.logfile.4.case.sensitive=false
#monitor.logfile.4.regex.mode=false
#monitor.logfile.4.alert.on.first.match=true

# Alert settings
# alert.on.first.match - If true, only send alert on first occurrence of each keyword
# If false, send alert every time keywords are detected
alert.on.first.match=true

# Logging configuration
log.directory=logs
log.level=INFO
log.retention.days=30
log.purge.interval.hours=24
