# ProGuard Configuration for Island Pacific Monitoring

# Target Java 17
-target 17

# Ignore warnings for unresolved references in third-party libraries
# (We are only obfuscating our own classes, and maven-shade-plugin will bundle dependencies later)
-dontwarn **
-dontnote **

# Keep all standard entry points
-keepclasseswithmembers public class * {
    public static void main(java.lang.String[]);
}

# Keep the Application class and standard methods if this ever becomes a Spring Boot app, or similar
# -keep class com.islandpacific.monitoring.**Application { *; }

# Keep all Enums intact, since they might be used in reflection or switch statements
-keepclassmembers enum * {
    public static **[] values();
    public static ** valueOf(java.lang.String);
}

# Keep all annotations natively
-keepattributes *Annotation*,Signature,Exception,InnerClasses,EnclosingMethod

# Keep standard reflective patterns
-keepclassmembers class * {
    @org.springframework.beans.factory.annotation.Autowired <fields>;
    @org.springframework.beans.factory.annotation.Value <fields>;
}

# Do not obfuscate standard properties
-keepclassmembers class * implements java.io.Serializable {
    static final long serialVersionUID;
    private static final java.io.ObjectStreamField[] serialPersistentFields;
    private void writeObject(java.io.ObjectOutputStream);
    private void readObject(java.io.ObjectInputStream);
    java.lang.Object writeReplace();
    java.lang.Object readResolve();
}
