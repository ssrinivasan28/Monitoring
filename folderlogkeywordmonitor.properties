# Folder Log Keyword Monitor Configuration
# Monitors all files recursively in a folder for specific keywords

# Metrics port for Prometheus scraping
metrics.port=3026

# Check interval in minutes
check.interval.minutes=60

# Client name (used in email subject)
client.name=MyClient

# Path to email configuration file
email.config.path=email.properties

# Folder to monitor (all files and subfolders scanned recursively)
monitor.folder.path=C:\\Logs\\MyFolder

# Keywords to search for (comma-separated)
monitor.keywords=ERROR,FATAL,Exception,FAILED

# Case sensitive keyword matching (true/false)
monitor.case.sensitive=false

# Logging configuration
log.level=INFO
log.folder=logs
log.retention.days=30
log.purge.interval.hours=24
