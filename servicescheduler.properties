# ===============================
# Service Scheduler Configuration
# ===============================

# Where to save screenshots
screenshot.folder=screenshots

# -----------------------------------------------------------------------
# Job definitions
# Each job has:
#   label               — display name (used in emails and filenames)
#   server              — hostname or IP of the application server
#   username            — Windows account for PSRemoting (DOMAIN\\user)
#   password            — password for the above account
#   service.name        — exact Windows service name (sc query <name>)
#   url                 — URL to poll and screenshot after restart
#   stop.time           — HH:mm time to stop the service
#   start.time          — HH:mm time to start the service (must be after stop.time)
#   schedule            — DAILY | DAILY_EXCEPT_SATURDAY | DAILY_EXCEPT_SUNDAY | WEEKLY | MONTHLY_NTH_WEEKDAY
#   schedule.day        — (WEEKLY only) MONDAY..SUNDAY
#   schedule.nth        — (MONTHLY_NTH_WEEKDAY only) 1=first, 2=second, etc.
#   schedule.weekday    — (MONTHLY_NTH_WEEKDAY only) MONDAY..SUNDAY
#   poll.interval.seconds — how often to check the URL (default 10)
#   poll.timeout.seconds  — max wait for URL to become ready (default 120)
# -----------------------------------------------------------------------

# Job 1: AUTHENTICATOR — daily
job.1.label=AUTHENTICATOR
job.1.server=
job.1.username=
job.1.password=
job.1.service.name=
job.1.url=
job.1.stop.time=10:40
job.1.start.time=10:45
job.1.schedule=DAILY
job.1.poll.interval.seconds=10
job.1.poll.timeout.seconds=120

