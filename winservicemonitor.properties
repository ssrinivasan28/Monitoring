# Windows Service Monitor Configuration

# Comma-separated list of servers to monitor
monitor.servers=ipqa-auto2,192.168.9.178

# Fallback: services checked on any server that has no per-server list below
# Leave blank if every server has its own list
monitor.services=

# How often to check services (in seconds)
# e.g. 60 = check every 1 minute
monitor.interval.seconds=60

# Number of consecutive failed checks before sending an alert email
# e.g. with interval=60 and window=2, an alert is sent if the service is down for 2 checks in a row (2 minutes)
monitor.alert.window.size=2

# Parallel polling threads (one thread per server)
monitor.poll.threads=5

# Prometheus metrics port
metrics.port=3026

