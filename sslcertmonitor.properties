# SSL Certificate Expiry Monitor Configuration

# Client name — included in email subject and body
client.name=Island Pacific

# Comma-separated list of hosts to monitor
# Format: host:port  (port defaults to 443 if omitted)
ssl.hosts=myapp.islandpacific.com:443,portal.islandpacific.com:443,api.islandpacific.com:443

# Alert at each threshold (comma-separated, descending order)
# Sends one email per threshold as the certificate approaches expiry
ssl.warning.days=30,15,7,3

# How often to check certificates (in milliseconds)
# 86400000 = once per day
monitor.interval.ms=86400000

# Prometheus metrics port
metrics.port=3027

# Log settings
log.level=INFO
log.folder=logs
log.retention.days=30
log.purge.interval.hours=24
