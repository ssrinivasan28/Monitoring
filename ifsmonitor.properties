# Global metrics server port (for Prometheus). Default is 8080.
metrics.port=3034

# Global interval in minutes for monitoring all configured IFS locations.
monitor.interval.minutes=5
monitor.server=IOHANA



ibmi.server=192.168.9.121
ibmi.user=IPGUI
ibmi.password= IPGUI

# --- IFS Monitoring Location 1: IPTSFIL8_DLX_DISTRIBUTION ---
# A unique short code for this monitoring location, used in properties keys
ifs.location.DLX_DISTRO.name=IPTSFIL8_DLX_DISTRIBUTION
ifs.location.DLX_DISTRO.path=//192.168.9.121/root/IPTSFIL8/WI/DLX/DISTRO
ifs.location.DLX_DISTRO.min.files=0
ifs.location.DLX_DISTRO.max.files=2
ifs.location.DLX_DISTRO.alert.too.few.subject=ALERT: Too Few Files in %s
# Corrected: Added initial %s for monitorServerName
ifs.location.DLX_DISTRO.alert.too.few.body.prefix=Observation from server %s: The IFS folder at %s has only %d files. Expected at least %d files.
ifs.location.DLX_DISTRO.alert.too.many.subject=ALERT: Too Many Files in %s
# Corrected: Added initial %s for monitorServerName
ifs.location.DLX_DISTRO.alert.too.many.body.prefix=Observation from server %s: The IFS folder at %s has %d files. Exceeded maximum of %d files.
ifs.location.DLX_DISTRO.ignore.zero.file.alert=false


